<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pengguna</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <!-- Container utama -->
    <div class="max-w-4xl w-full bg-white rounded-xl shadow-lg overflow-hidden">
        
        <!-- Header dengan warna gradien -->
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 px-6 py-8 text-white">
            <h1 class="text-3xl font-bold text-center">Profil Pengguna</h1>
            <p class="text-center text-blue-100 mt-2">Kelola informasi profil Anda</p>
        </div>

        <!-- Konten utama -->
        <div class="p-6 md:p-8">
            <!-- Grid untuk layout responsif -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <!-- Bagian Foto Profil -->
                <div class="md:col-span-1">
                    <div class="flex flex-col items-center space-y-4">
                        <!-- Avatar placeholder -->
                        <div class="w-32 h-32 rounded-full bg-gradient-to-r from-blue-400 to-purple-500 flex items-center justify-center text-white text-4xl font-bold">
                            <span>JD</span>
                        </div>
                        
                        <!-- Tombol upload foto -->
                        <label class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg transition duration-300 text-sm">
                            <span>Ubah Foto</span>
                            <input type="file" class="hidden" accept="image/*">
                        </label>
                        
                        <!-- Status online -->
                        <div class="flex items-center space-x-2">
                            <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                            <span class="text-sm text-gray-600">Online</span>
                        </div>
                    </div>
                </div>

                <!-- Form Profil -->
                <div class="md:col-span-2">
                    <form class="space-y-6">
                        <!-- Grid untuk form dalam 2 kolom pada layar besar -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <!-- Nama Depan -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                    Nama Depan
                                </label>
                                <input type="text" 
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                       placeholder="John"
                                       value="John">
                            </div>

                            <!-- Nama Belakang -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                    Nama Belakang
                                </label>
                                <input type="text" 
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                       placeholder="Doe"
                                       value="Doe">
                            </div>
                        </div>

                        <!-- Email -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Email
                            </label>
                            <input type="email" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                   placeholder="email@example.com"
                                   value="john.doe@example.com">
                        </div>

                        <!-- Nomor Telepon -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Nomor Telepon
                            </label>
                            <input type="tel" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                   placeholder="+62 812-3456-7890"
                                   value="+62 812-3456-7890">
                        </div>

                        <!-- Tanggal Lahir -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Tanggal Lahir
                            </label>
                            <input type="date" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                   value="1990-01-01">
                        </div>

                        <!-- Jenis Kelamin -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Jenis Kelamin
                            </label>
                            <div class="flex space-x-6">
                                <label class="flex items-center space-x-2">
                                    <input type="radio" name="gender" class="w-4 h-4 text-blue-600" checked>
                                    <span class="text-gray-700">Laki-laki</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="radio" name="gender" class="w-4 h-4 text-blue-600">
                                    <span class="text-gray-700">Perempuan</span>
                                </label>
                            </div>
                        </div>

                        <!-- Bio -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Bio
                            </label>
                            <textarea rows="3" 
                                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                      placeholder="Ceritakan tentang diri Anda...">Pengembang web yang suka belajar hal baru.</textarea>
                        </div>

                        <!-- Hobi -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Hobi
                            </label>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded" checked>
                                    <span class="text-gray-700">Membaca</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                    <span class="text-gray-700">Olahraga</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded" checked>
                                    <span class="text-gray-700">Musik</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                    <span class="text-gray-700">Traveling</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
                                    <span class="text-gray-700">Fotografi</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded" checked>
                                    <span class="text-gray-700">Game</span>
                                </label>
                            </div>
                        </div>

                        <!-- Tombol Aksi -->
                        <div class="flex flex-col sm:flex-row gap-3 pt-4">
                            <button type="submit" 
                                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-300">
                                Simpan Perubahan
                            </button>
                            <button type="reset" 
                                    class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg transition duration-300">
                                Reset
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
            <p class="text-center text-sm text-gray-600">
                Terakhir diperbarui: 7 Maret 2026
            </p>
        </div>
    </div>
</body>
</html>
